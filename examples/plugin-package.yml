##
## Example caller workflow. Copy this into a plugin repo as
## .github/workflows/package.yml and adjust `repo` (and use_buildenv:false for
## pure-Python plugins that don't need the C++ build environment).
##
name: package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  package:
    permissions:
      contents: read
    uses: RobRaesemann/fledge-pkg-indyiq/.github/workflows/build-plugin.yml@main
    with:
      repo: fledge-south-ethernetip
      branch: ${{ github.ref_name }}
      # use_buildenv: false   # uncomment for pure-Python plugins
