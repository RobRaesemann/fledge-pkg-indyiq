##
## Reusable workflow: build a .deb for a single IndyIQ Fledge plugin.
##
## A plugin repo calls this from its own workflow, e.g.:
##
##   jobs:
##     package:
##       permissions: { contents: read }
##       uses: RobRaesemann/fledge-pkg-indyiq/.github/workflows/build-plugin.yml@main
##       with:
##         repo: fledge-south-ethernetip
##         branch: ${{ github.ref_name }}
##
## Only fledge-pkg-indyiq's own build-buildenv.yml ever builds/pushes the
## fledge-buildenv image (on Dockerfile change, weekly, or manually). Plugin
## repos never build or push it — they only pull the public image (or skip it
## entirely for pure-Python plugins via use_buildenv:false) and build inside
## it. This avoids every plugin repo needing GHCR write access.
##
name: build-plugin

on:
  workflow_call:
    inputs:
      repo:
        description: Plugin repository name (under the org)
        required: true
        type: string
      branch:
        description: Branch/ref of the plugin repo to package
        required: false
        default: main
        type: string
      org:
        description: GitHub org/user hosting the plugin repos
        required: false
        default: RobRaesemann
        type: string
      pkg_ref:
        description: Ref of the central packaging repo to use (make_deb + Dockerfile)
        required: false
        default: main
        type: string
      image:
        description: fledge-buildenv image ref (must be lowercase, publicly readable)
        required: false
        default: ghcr.io/robraesemann/fledge-buildenv:latest
        type: string
      use_buildenv:
        description: Build inside the shared fledge-buildenv image (needed for C++). Pure-Python plugins can set this false to build on the bare runner instead.
        required: false
        default: true
        type: boolean
      skip_requirements:
        description: Skip the plugin's requirements.sh. Only safe for plugins whose native deps are already baked into the buildenv image (e.g. ethernetip's libplctag) — most C++ plugins have their own deps and need this false (the default).
        required: false
        default: false
        type: boolean

env:
  PKG_REPO: RobRaesemann/fledge-pkg-indyiq

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container: ${{ inputs.use_buildenv && inputs.image || '' }}
    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.PKG_REPO }}
          ref: ${{ inputs.pkg_ref }}

      - name: Build package
        # GITHUB_TOKEN authenticates make_deb's clone of the plugin repo — it's
        # always the same repo that triggered this run, so the run's own token
        # already has the read access it needs.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./make_deb
          if [ "${{ inputs.skip_requirements }}" = "true" ]; then
            ./make_deb -s -o "${{ inputs.org }}" -b "${{ inputs.branch }}" "${{ inputs.repo }}"
          else
            ./make_deb -o "${{ inputs.org }}" -b "${{ inputs.branch }}" "${{ inputs.repo }}"
          fi

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.repo }}-deb
          path: packages/build/*.deb
          if-no-files-found: error
