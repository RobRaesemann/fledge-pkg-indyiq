##
## Builds and publishes the fledge-buildenv image to GHCR.
## Runs when the Dockerfile changes, weekly (to pick up base-image security
## updates), or on demand. Plugin builds pull this image.
##
name: build-buildenv

on:
  push:
    paths:
      - docker/fledge-buildenv/**
      - .github/workflows/build-buildenv.yml
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      fledge_branch:
        description: Fledge branch/tag for headers
        required: false
        default: v3.1.0

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lowercase image name
        id: img
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fledge-buildenv" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: docker/fledge-buildenv
          push: true
          build-args: |
            FLEDGE_BRANCH=${{ github.event.inputs.fledge_branch || 'v3.1.0' }}
          tags: |
            ${{ steps.img.outputs.image }}:latest
            ${{ steps.img.outputs.image }}:${{ github.event.inputs.fledge_branch || 'v3.1.0' }}
          cache-from: type=registry,ref=${{ steps.img.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.img.outputs.image }}:buildcache,mode=max
